services:
  shirasal:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: shirasal-server
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - DB_TYPE=sqlite
      - DB_FILE_PATH=/app/server/data/shirasal.sqlite
      # Für MariaDB-Nutzung, einkommentieren und anpassen:
      # - DB_TYPE=mariadb
      # - DB_HOST=db-host-ip
      # - DB_PORT=3306
      # - DB_USER=shirasal
      # - DB_PASS=secret
      # - DB_NAME=shirasal_db
    volumes:
      - shirasal-data:/app/server/data
    restart: unless-stopped

volumes:
  shirasal-data:
