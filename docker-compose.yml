services:
  # 1. Haupt-Produktionsinstanz (OHNE Demo-Rollen)
  shirasal-prod:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: shirasal-prod
    environment:
      - NODE_ENV=production
      - DB_TYPE=sqlite
      - DB_FILE_PATH=/app/server/data/shirasal.sqlite
      - ALLOW_DEMO_ROLES=false
      - LIVEKIT_URL=http://livekit-server:7880
      - LIVEKIT_API_KEY=shirasal_lk_key
      - LIVEKIT_API_SECRET=shirasal_lk_secret_secure_string_987654321
      - LIVEKIT_PUBLIC_URL=wss://lk.shirasal.eu
      # Für MariaDB-Nutzung (Werte werden sicher aus der .env geladen):
      # - DB_TYPE=mariadb
      # - DB_HOST=db-host-ip
      # - DB_PORT=3306
      # - DB_USER=${DB_USER}
      # - DB_PASS=${DB_PASS}
      # - DB_NAME=${DB_NAME}
    labels:
      traefik.enable: "true"
      traefik.docker.network: "traefik_proxy"
      traefik.http.routers.shirasal-prod.rule: "Host(`voice.shirasal.eu`)"
      traefik.http.routers.shirasal-prod.entrypoints: "websecure"
      traefik.http.routers.shirasal-prod.tls: "true"
      traefik.http.routers.shirasal-prod.tls.certresolver: "http-resolver"
      traefik.http.services.shirasal-prod.loadbalancer.server.port: "3001"
      traefik.http.services.shirasal-prod.loadbalancer.server.scheme: "http"
    networks:
      - default
      - traefik_proxy
    volumes:
      - shirasal-prod-data:/app/server/data
    restart: unless-stopped

  # 2. Demo-Instanz (MIT Demo-Rollen für GitHub-Tester)
  shirasal-demo:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: shirasal-demo
    environment:
      - NODE_ENV=production
      - DB_TYPE=sqlite
      - DB_FILE_PATH=/app/server/data/shirasal.sqlite
      - ALLOW_DEMO_ROLES=true
      - LIVEKIT_URL=http://livekit-server:7880
      - LIVEKIT_API_KEY=shirasal_lk_key
      - LIVEKIT_API_SECRET=shirasal_lk_secret_secure_string_987654321
      - LIVEKIT_PUBLIC_URL=wss://lk.shirasal.eu
      # Für MariaDB-Nutzung (Werte werden sicher aus der .env geladen):
      # - DB_TYPE=mariadb
      # - DB_HOST=db-host-ip
      # - DB_PORT=3306
      # - DB_USER=${DB_USER}
      # - DB_PASS=${DB_PASS}
      # - DB_NAME=${DB_NAME}
    labels:
      traefik.enable: "true"
      traefik.docker.network: "traefik_proxy"
      traefik.http.routers.shirasal-demo.rule: "Host(`demo.shirasal.eu`)"
      traefik.http.routers.shirasal-demo.entrypoints: "websecure"
      traefik.http.routers.shirasal-demo.tls: "true"
      traefik.http.routers.shirasal-demo.tls.certresolver: "http-resolver"
      traefik.http.services.shirasal-demo.loadbalancer.server.port: "3001"
      traefik.http.services.shirasal-demo.loadbalancer.server.scheme: "http"
    networks:
      - default
      - traefik_proxy
    volumes:
      - shirasal-demo-data:/app/server/data
    restart: unless-stopped

  # 3. LiveKit SFU Server
  livekit-server:
    image: livekit/livekit-server:latest
    container_name: livekit-server
    command: --config /etc/livekit.yaml
    restart: unless-stopped
    volumes:
      - ./livekit.yaml:/etc/livekit.yaml
    ports:
      - "7880:7880"
      - "7881:7881"
      - "50000-50100:50000-50100/udp"
    labels:
      traefik.enable: "true"
      traefik.docker.network: "traefik_proxy"
      traefik.http.routers.livekit.rule: "Host(`lk.shirasal.eu`)"
      traefik.http.routers.livekit.entrypoints: "websecure"
      traefik.http.routers.livekit.tls: "true"
      traefik.http.routers.livekit.tls.certresolver: "http-resolver"
      traefik.http.services.livekit.loadbalancer.server.port: "7880"
    networks:
      - default
      - traefik_proxy

volumes:
  shirasal-prod-data:
  shirasal-demo-data:

networks:
  default:
  traefik_proxy:
    external: true

